<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告中心 | 财务分析项目</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <!-- Markdown渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>
    <!-- 现代化导航栏 -->
    <nav class="modern-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-brand-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="nav-brand-text">
                    <span>财务分析中心</span>
                    <span class="nav-brand-subtitle">专业 · 深度 · 实时</span>
                </div>
            </a>
            
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </a>
                <a href="#" class="nav-link active" data-category="all">
                    <i class="fas fa-file-alt"></i>
                    <span>全部报告</span>
                </a>
                <a href="#" class="nav-link" data-category="company">
                    <i class="fas fa-building"></i>
                    <span>公司分析</span>
                </a>
                <a href="#" class="nav-link" data-category="industry">
                    <i class="fas fa-industry"></i>
                    <span>行业分析</span>
                </a>
                <a href="#" class="nav-link" data-category="ai">
                    <i class="fas fa-robot"></i>
                    <span>AI分析</span>
                </a>
            </div>
            
            <div class="nav-actions">
                <button class="nav-action-btn" onclick="window.print()">
                    <i class="fas fa-print"></i>
                    <span>打印</span>
                </button>
                <a href="https://github.com/mengliang555/finance" target="_blank" class="nav-action-btn">
                    <i class="fab fa-github"></i>
                    <span>源码</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1 class="page-title">分析报告中心</h1>
            <p class="page-subtitle">专业、深度的财务分析报告，支持实时Markdown渲染，点击即可查看详细内容</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #ff6b6b, #ff8e8e);">
                    <i class="fas fa-building"></i>
                </div>
                <div class="stat-value" id="companyCount">4</div>
                <div class="stat-label">公司分析报告</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #4ecdc4, #6de5dd);">
                    <i class="fas fa-industry"></i>
                </div>
                <div class="stat-value" id="industryCount">2</div>
                <div class="stat-label">行业分析报告</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #45b7d1, #67c9e0);">
                    <i class="fas fa-calendar-day"></i>
                </div>
                <div class="stat-value" id="dailyCount">1</div>
                <div class="stat-label">每日市场报告</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #5f27cd, #7d4ce8);">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="stat-value" id="aiCount">2</div>
                <div class="stat-label">AI技术分析</div>
            </div>
        </div>

        <!-- 分类筛选 -->
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">
                <i class="fas fa-layer-group"></i>
                <span>全部报告</span>
            </button>
            <button class="filter-btn" data-category="company">
                <i class="fas fa-building"></i>
                <span>公司分析</span>
            </button>
            <button class="filter-btn" data-category="industry">
                <i class="fas fa-industry"></i>
                <span>行业分析</span>
            </button>
            <button class="filter-btn" data-category="daily">
                <i class="fas fa-calendar-day"></i>
                <span>每日报告</span>
            </button>
            <button class="filter-btn" data-category="ai">
                <i class="fas fa-robot"></i>
                <span>AI分析</span>
            </button>
            <button class="filter-btn" data-category="guides">
                <i class="fas fa-book"></i>
                <span>指南文档</span>
            </button>
        </div>

        <!-- 报告网格 -->
        <div class="reports-grid" id="reportsGrid">
            <!-- 报告卡片将通过JavaScript动态生成 -->
            <div class="loading">
                <div class="loading-spinner"></div>
                <span>正在加载报告列表...</span>
            </div>
        </div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">
                <i class="fas fa-file-alt"></i>
            </div>
            <h3>暂无报告</h3>
            <p>当前分类下没有找到分析报告。</p>
        </div>
    </main>

    <!-- 报告查看器 -->
    <div class="report-viewer" id="reportViewer">
        <div class="viewer-container">
            <div class="viewer-header">
                <h2 class="viewer-title" id="viewerTitle">报告标题</h2>
                <button class="viewer-close" id="viewerClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="viewer-content" id="viewerContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>正在加载报告内容...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="page-footer">
        <p>© 2026 财务分析中心 · 专业财务分析与投资研究</p>
        <div class="footer-links">
            <a href="index.html" class="footer-link">返回首页</a>
            <a href="https://github.com/mengliang555/finance" target="_blank" class="footer-link">GitHub仓库</a>
            <a href="#" class="footer-link" onclick="window.print()">打印页面</a>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/reports.js"></script>
</body>
</html>
